<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أناقة ستور - تسوق الأناقة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .tab-active { border-bottom: 2px solid #111827; color: #111827; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-xl font-bold text-gray-900">أناقة ستور</div>

            <button onclick="toggleCart()" class="relative text-gray-600 hover:text-black p-2 text-2xl">
                🛒
                <span id="cartCount"
                      class="absolute top-0 right-0 bg-red-600 text-white rounded-full w-4 h-4 text-[10px] flex items-center justify-center">0</span>
            </button>
        </div>
    </nav>

    <header class="bg-gray-900 text-white py-12 px-4 text-center">
        <h1 class="text-3xl md:text-5xl font-bold mb-3">اكتشف أسلوبك الخاص</h1>
        <p class="text-sm md:text-lg text-gray-400 mb-6">تشكيلة مختارة بعناية لأناقتك اليومية</p>
    </header>

    <main class="container mx-auto px-4 py-8">

        <div class="flex justify-start gap-4 mb-8 overflow-x-auto no-scrollbar pb-2 whitespace-nowrap">
            <button onclick="setFilter('الكل')" id="btn-الكل"
                    class="px-4 py-2 font-bold tab-active transition whitespace-nowrap">الكل</button>

            <button onclick="setFilter('ساعات')" id="btn-ساعات"
                    class="px-4 py-2 font-bold hover:text-gray-900 transition whitespace-nowrap">الساعات</button>

            <button onclick="setFilter('ملابس')" id="btn-ملابس"
                    class="px-4 py-2 font-bold hover:text-gray-900 transition whitespace-nowrap">الملابس</button>

            <button onclick="setFilter('أحذية')" id="btn-أحذية"
                    class="px-4 py-2 font-bold hover:text-gray-900 transition whitespace-nowrap">الأحذية</button>

            <button onclick="setFilter('حقائب')" id="btn-حقائب"
                    class="px-4 py-2 font-bold hover:text-gray-900 transition whitespace-nowrap">الحقائب</button>
        </div>

        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </main>

    <div id="cartModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-end md:items-center justify-center">
        <div class="bg-white rounded-t-2xl md:rounded-2xl shadow-xl w-full max-w-md p-6 max-h-[80vh] overflow-y-auto">

            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">عربة التسوق</h3>
                <button onclick="toggleCart()" class="text-gray-500 font-bold p-2">إغلاق</button>
            </div>

            <div id="cartItems" class="space-y-4 mb-4"></div>

            <div class="border-t pt-4">
                <p id="totalPrice" class="text-lg font-bold">الإجمالي: 0 أوقية</p>

                <button onclick="checkout()"
                        class="w-full mt-4 bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 font-bold">
                    إتمام الطلب عبر واتساب
                </button>
            </div>
        </div>
    </div>

    <script>
        const password = "123456";
        const whatsappNumber = "22237929637";

        const products = [
            {
                id: 1,
                name: "ساعة كلاسيكية",
                price: 1200,
                category: "ساعات",
                img: "https://images.unsplash.com/photo-1524592094714-0f0654e20314?auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 2,
                name: "ساعة رياضية",
                price: 850,
                category: "ساعات",
                img: "https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1?auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 3,
                name: "ساعة ذهبية",
                price: 2500,
                category: "ساعات",
                img: "https://images.unsplash.com/photo-1539874754764-5a96559165b0?auto=format&fit=crop&w=500&q=80"
            },

            {
                id: 4,
                name: "قميص كتان",
                price: 350,
                category: "ملابس",
                img: "https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 5,
                name: "سترة شتوية",
                price: 600,
                category: "ملابس",
                img: "https://images.unsplash.com/photo-1548883354-94bcfe321cbb?auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 6,
                name: "تيشيرت قطني",
                price: 150,
                category: "ملابس",
                img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=500&q=80"
            },

            {
                id: 7,
                name: "حذاء جلد",
                price: 450,
                category: "أحذية",
                img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 8,
                name: "حذاء رياضي",
                price: 300,
                category: "أحذية",
                img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 9,
                name: "حذاء رسمي",
                price: 520,
                category: "أحذية",
                img: "https://images.unsplash.com/photo-1614252369475-531eba835eb1?auto=format&fit=crop&w=500&q=80"
            },

            {
                id: 10,
                name: "حقيبة جلدية",
                price: 750,
                category: "حقائب",
                img: "https://images.unsplash.com/photo-1594223274512-ad4803739b7c?auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 11,
                name: "حقيبة سفر",
                price: 500,
                category: "حقائب",
                img: "https://images.unsplash.com/photo-1565026057447-bc90a3dceb87?auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 12,
                name: "حقيبة ظهر",
                price: 280,
                category: "حقائب",
                img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=500&q=80"
            }
        ];

        let cart = [];
        let currentFilter = "الكل";

        function setFilter(filter) {
            currentFilter = filter;

            document.querySelectorAll('button[onclick^="setFilter"]').forEach(btn => {
                btn.classList.remove("tab-active");
            });

            document.getElementById(`btn-${filter}`).classList.add("tab-active");

            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById("productGrid");

            const filteredProducts =
                currentFilter === "الكل"
                    ? products
                    : products.filter(p => p.category === currentFilter);

            grid.innerHTML = filteredProducts.map(p => `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 flex flex-col hover:shadow-lg transition">
                    <img src="${p.img}" alt="${p.name}" class="w-full aspect-square object-cover">

                    <div class="p-3 flex-grow text-center">
                        <span class="text-[10px] text-gray-400">${p.category}</span>
                        <h3 class="font-bold text-sm mb-1">${p.name}</h3>
                        <p class="text-xs text-gray-600 mb-3">${p.price} أوقية</p>

                        <button onclick="addToCart(${p.id})"
                                class="bg-gray-900 text-white py-2 rounded-lg text-xs w-full hover:bg-gray-800 transition">
                            إضافة إلى العربة
                        </button>
                    </div>
                </div>
            `).join("");
        }

        function toggleCart() {
            document.getElementById("cartModal").classList.toggle("hidden");
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
            alert("تمت إضافة المنتج إلى العربة");
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById("cartItems");
            const total = document.getElementById("totalPrice");
            const count = document.getElementById("cartCount");

            count.innerText = cart.length;

            if (cart.length === 0) {
                list.innerHTML = `<p class="text-sm text-gray-500 text-center">العربة فارغة</p>`;
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div class="flex justify-between items-center border-b pb-2 text-sm">
                        <div>
                            <p class="font-bold">${item.name}</p>
                            <p class="text-gray-500">${item.price} أوقية</p>
                        </div>

                        <button onclick="removeFromCart(${index})"
                                class="text-red-600 text-xs font-bold">
                            حذف
                        </button>
                    </div>
                `).join("");
            }

            const totalPrice = cart.reduce((acc, curr) => acc + curr.price, 0);
            total.innerText = `الإجمالي: ${totalPrice} أوقية`;
        }

        function checkout() {
            if (cart.length === 0) {
                alert("العربة فارغة");
                return;
            }

            const enteredPassword = prompt("أدخل كود التأكيد:");

            if (enteredPassword !== password) {
                alert("الكود غير صحيح");
                return;
            }

            const totalPrice = cart.reduce((acc, curr) => acc + curr.price, 0);

            const orderDetails = cart.map((item, index) => {
                return `${index + 1}- ${item.name} - ${item.price} أوقية`;
            }).join("%0A");

            const message =
                `السلام عليكم، أريد طلب المنتجات التالية:%0A%0A${orderDetails}%0A%0Aالإجمالي: ${totalPrice} أوقية`;

            window.open(`https://wa.me/${whatsappNumber}?text=${message}`, "_blank");

            cart = [];
            updateCartUI();
            toggleCart();
        }

        window.onload = function () {
            renderProducts();
            updateCartUI();
        };
    </script>

</body>
</html>
