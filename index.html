<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ريم للخدمات الإلكترونية</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Tajawal', sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="bg-gray-50 text-gray-900">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <div>
        <h1 class="text-xl md:text-2xl font-black">ريم للخدمات الإلكترونية</h1>
        <p class="text-xs text-gray-500">شحن تطبيقات، ألعاب، وخدمات رقمية</p>
      </div>

      <button onclick="openAdminLogin()" class="bg-gray-900 text-white px-4 py-2 rounded-xl text-sm font-bold">
        دخول المدير
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <header class="bg-gradient-to-l from-gray-900 to-gray-700 text-white">
    <div class="max-w-6xl mx-auto px-4 py-10">
      <h2 class="text-3xl md:text-4xl font-black mb-3">متجر ريم للخدمات الإلكترونية</h2>
      <p class="text-gray-200 mb-5">اطلب خدمتك بسرعة عبر واتساب: 37929637</p>

      <a href="https://wa.me/22237929637" target="_blank"
         class="inline-block bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-bold">
        تواصل عبر واتساب
      </a>
    </div>
  </header>

  <!-- Products -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-5">
      <div>
        <h2 class="text-2xl font-black">المنتجات والخدمات</h2>
        <p class="text-sm text-gray-500">اختر المنتج واطلبه مباشرة عبر واتساب</p>
      </div>

      <button onclick="loadProductsFromSupabase()" class="bg-white border px-4 py-2 rounded-xl text-sm font-bold">
        تحديث
      </button>
    </div>

    <div id="categoryFilters" class="flex gap-2 overflow-x-auto no-scrollbar mb-6 pb-2"></div>

    <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      <div class="col-span-full text-center py-12 text-gray-500">
        جاري تحميل المنتجات...
      </div>
    </div>
  </main>

  <!-- Admin Modal -->
  <div id="adminModal" class="hidden fixed inset-0 bg-black/60 z-[9999] items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">

      <div class="flex justify-between items-center p-4 border-b">
        <h2 class="text-xl font-black">لوحة التحكم</h2>
        <button onclick="closeAdminLogin()" class="text-3xl leading-none text-gray-500">&times;</button>
      </div>

      <!-- Login -->
      <div id="loginBox" class="p-4">
        <label class="block text-sm font-bold mb-1">إيميل المدير</label>
        <input id="adminEmail" type="email" value="admin@store.com"
               class="w-full border rounded-xl px-3 py-2 mb-3 outline-none focus:ring-2 focus:ring-gray-900">

        <label class="block text-sm font-bold mb-1">كلمة المرور</label>
        <input id="adminPassword" type="password" placeholder="مثال: 123456"
               class="w-full border rounded-xl px-3 py-2 mb-4 outline-none focus:ring-2 focus:ring-gray-900">

        <button onclick="adminLogin()" class="w-full bg-gray-900 text-white rounded-xl py-2 font-bold">
          تسجيل الدخول
        </button>

        <p id="loginMessage" class="text-sm mt-3 text-center"></p>
      </div>

      <!-- Admin Panel -->
      <div id="panelBox" class="hidden p-4">
        <div class="bg-green-50 text-green-700 rounded-xl p-3 text-sm mb-4">
          تم الدخول كمدير. يمكنك إضافة المنتجات الآن.
        </div>

        <label class="block text-sm font-bold mb-1">اسم المنتج</label>
        <input id="productName" type="text" placeholder="مثال: شحن TikTok"
               class="w-full border rounded-xl px-3 py-2 mb-3 outline-none focus:ring-2 focus:ring-green-600">

        <label class="block text-sm font-bold mb-1">السعر بالأوقية</label>
        <input id="productPrice" type="number" placeholder="مثال: 1000"
               class="w-full border rounded-xl px-3 py-2 mb-3 outline-none focus:ring-2 focus:ring-green-600">

        <label class="block text-sm font-bold mb-1">القسم</label>
        <input id="productCategory" type="text" placeholder="مثال: شحن التطبيقات"
               class="w-full border rounded-xl px-3 py-2 mb-3 outline-none focus:ring-2 focus:ring-green-600">

        <label class="block text-sm font-bold mb-1">رابط الصورة</label>
        <input id="productImg" type="url" placeholder="https://example.com/image.png"
               class="w-full border rounded-xl px-3 py-2 mb-4 outline-none focus:ring-2 focus:ring-green-600">

        <button onclick="addProduct()" class="w-full bg-green-600 hover:bg-green-700 text-white rounded-xl py-2 font-bold mb-3">
          إضافة المنتج
        </button>

        <button onclick="adminLogout()" class="w-full bg-red-600 hover:bg-red-700 text-white rounded-xl py-2 font-bold">
          خروج
        </button>

        <p id="panelMessage" class="text-sm mt-3 text-center"></p>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://cfqnhhmpwfzsyqqjrkpx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_C3wNFfUfFtdtdfWzMaTSaw_y7RzbZtx";

    const ADMIN_EMAIL = "admin@store.com";
    const STORE_WHATSAPP = "37929637";
    const DEFAULT_IMG = "https://placehold.co/600x400/f3f4f6/111827?text=Reem+Store";

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allProducts = [];
    let currentCategory = "الكل";

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatPrice(price) {
      const n = Number(price || 0);
      return `${n.toLocaleString("ar")} أوقية`;
    }

    function formatPhone(phone) {
      let p = String(phone || STORE_WHATSAPP).replace(/\D/g, "");
      if (p.startsWith("222")) return p;
      if (p.length === 8) return "222" + p;
      return "222" + STORE_WHATSAPP;
    }

    function makeWhatsappLink(product) {
      const phone = formatPhone(product.whatsapp || STORE_WHATSAPP);
      const msg = `السلام عليكم، أريد طلب: ${product.name}، السعر: ${product.price} أوقية`;
      return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    }

    async function loadProductsFromSupabase() {
      const grid = document.getElementById("productsGrid");
      grid.innerHTML = `
        <div class="col-span-full text-center py-12 text-gray-500">
          جاري تحميل المنتجات...
        </div>
      `;

      const { data, error } = await sb
        .from("products")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        grid.innerHTML = `
          <div class="col-span-full bg-red-50 text-red-700 p-5 rounded-2xl text-center">
            حدث خطأ في جلب المنتجات من Supabase.
          </div>
        `;
        return;
      }

      allProducts = data || [];
      renderCategoryFilters();
      renderProducts();
    }

    function renderCategoryFilters() {
      const filters = document.getElementById("categoryFilters");
      const categories = ["الكل", ...new Set(allProducts.map(p => p.category || "عام"))];

      filters.innerHTML = categories.map(cat => `
        <button
          data-category="${escapeHTML(cat)}"
          class="category-btn px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap ${
            currentCategory === cat
              ? "bg-gray-900 text-white"
              : "bg-white text-gray-700 border border-gray-200"
          }">
          ${escapeHTML(cat)}
        </button>
      `).join("");

      document.querySelectorAll(".category-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          currentCategory = btn.dataset.category;
          renderCategoryFilters();
          renderProducts();
        });
      });
    }

    function renderProducts() {
      const grid = document.getElementById("productsGrid");

      const products = currentCategory === "الكل"
        ? allProducts
        : allProducts.filter(p => (p.category || "عام") === currentCategory);

      if (!products.length) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-12 text-gray-500">
            لا توجد منتجات حالياً.
          </div>
        `;
        return;
      }

      grid.innerHTML = products.map(product => {
        const name = escapeHTML(product.name || "منتج");
        const category = escapeHTML(product.category || "عام");
        const price = formatPrice(product.price);
        const img = product.img || DEFAULT_IMG;
        const whatsappLink = makeWhatsappLink(product);

        return `
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition">
            <div class="h-36 md:h-44 bg-gray-100">
              <img src="${escapeHTML(img)}"
                   onerror="this.src='${DEFAULT_IMG}'"
                   alt="${name}"
                   class="w-full h-full object-cover">
            </div>

            <div class="p-3">
              <div class="text-xs text-gray-500 mb-1">${category}</div>

              <h3 class="font-black text-gray-900 text-sm md:text-base mb-2 min-h-[40px]">
                ${name}
              </h3>

              <div class="font-black text-gray-900 mb-3">
                ${price}
              </div>

              <a href="${whatsappLink}" target="_blank"
                 class="block text-center bg-green-600 hover:bg-green-700 text-white rounded-xl py-2 text-sm font-bold">
                طلب عبر واتساب
              </a>
            </div>
          </div>
        `;
      }).join("");
    }

    function openAdminLogin() {
      const modal = document.getElementById("adminModal");
      modal.classList.remove("hidden");
      modal.classList.add("flex");
      checkAdminSession();
    }

    function closeAdminLogin() {
      const modal = document.getElementById("adminModal");
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }

    function showLogin() {
      document.getElementById("loginBox").classList.remove("hidden");
      document.getElementById("panelBox").classList.add("hidden");
    }

    function showPanel() {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("panelBox").classList.remove("hidden");
    }

    async function checkAdminSession() {
      const { data } = await sb.auth.getUser();
      if (data.user && data.user.email === ADMIN_EMAIL) {
        showPanel();
      } else {
        showLogin();
      }
    }

    async function adminLogin() {
      const email = document.getElementById("adminEmail").value.trim();
      const password = document.getElementById("adminPassword").value.trim();
      const msg = document.getElementById("loginMessage");

      msg.textContent = "جاري تسجيل الدخول...";
      msg.className = "text-sm mt-3 text-center text-gray-500";

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        msg.textContent = "فشل تسجيل الدخول. تأكد من الإيميل وكلمة المرور.";
        msg.className = "text-sm mt-3 text-center text-red-600";
        return;
      }

      if (!data.user || data.user.email !== ADMIN_EMAIL) {
        await sb.auth.signOut();
        msg.textContent = "هذا الحساب ليس حساب المدير.";
        msg.className = "text-sm mt-3 text-center text-red-600";
        return;
      }

      msg.textContent = "";
      showPanel();
    }

    async function adminLogout() {
      await sb.auth.signOut();
      showLogin();
    }

    async function addProduct() {
      const name = document.getElementById("productName").value.trim();
      const price = Number(document.getElementById("productPrice").value);
      const category = document.getElementById("productCategory").value.trim() || "عام";
      const img = document.getElementById("productImg").value.trim() || null;

      const msg = document.getElementById("panelMessage");

      if (!name || !price) {
        msg.textContent = "اكتب اسم المنتج والسعر.";
        msg.className = "text-sm mt-3 text-center text-red-600";
        return;
      }

      msg.textContent = "جاري إضافة المنتج...";
      msg.className = "text-sm mt-3 text-center text-gray-500";

      const { error } = await sb.from("products").insert([
        { name, price, category, img }
      ]);

      if (error) {
        console.error(error);
        msg.textContent = "حدث خطأ. تأكد أن حساب المدير موجود وأن الصلاحيات صحيحة.";
        msg.className = "text-sm mt-3 text-center text-red-600";
        return;
      }

      msg.textContent = "تمت إضافة المنتج بنجاح.";
      msg.className = "text-sm mt-3 text-center text-green-600";

      document.getElementById("productName").value = "";
      document.getElementById("productPrice").value = "";
      document.getElementById("productCategory").value = "";
      document.getElementById("productImg").value = "";

      await loadProductsFromSupabase();
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadProductsFromSupabase();
    });

    window.openAdminLogin = openAdminLogin;
    window.closeAdminLogin = closeAdminLogin;
    window.adminLogin = adminLogin;
    window.adminLogout = adminLogout;
    window.addProduct = addProduct;
    window.loadProductsFromSupabase = loadProductsFromSupabase;
  </script>

</body>
</html>
