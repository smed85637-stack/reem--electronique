<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أناقة ستور - متجر عام</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .tab-active { border-bottom: 2px solid #111827; color: #111827; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center gap-3">
            <div class="text-xl font-extrabold text-gray-900">أناقة ستور</div>

            <div class="flex items-center gap-2">
                <button onclick="openAdminLogin()"
                        class="bg-gray-900 text-white px-3 py-2 rounded-lg text-xs font-bold">
                    المدير
                </button>

                <button onclick="toggleCart()" class="relative text-gray-600 hover:text-black p-2 text-2xl">
                    🛒
                    <span id="cartCount"
                          class="absolute top-0 right-0 bg-red-600 text-white rounded-full w-4 h-4 text-[10px] flex items-center justify-center">
                        0
                    </span>
                </button>
            </div>
        </div>
    </nav>

    <header class="bg-gray-900 text-white py-12 px-4 text-center">
        <h1 class="text-3xl md:text-5xl font-extrabold mb-3">اكتشف أسلوبك الخاص</h1>
        <p class="text-sm md:text-lg text-gray-400">تشكيلة مختارة بعناية لأناقتك اليومية</p>
    </header>

    <main class="container mx-auto px-4 py-8">

        <div class="flex justify-start gap-4 mb-8 overflow-x-auto no-scrollbar pb-2 whitespace-nowrap">
            <button onclick="setFilter('الكل')" id="btn-الكل"
                    class="px-4 py-2 font-bold tab-active transition whitespace-nowrap">الكل</button>

            <button onclick="setFilter('ساعات')" id="btn-ساعات"
                    class="px-4 py-2 font-bold hover:text-gray-900 transition whitespace-nowrap">الساعات</button>

            <button onclick="setFilter('ملابس')" id="btn-ملابس"
                    class="px-4 py-2 font-bold hover:text-gray-900 transition whitespace-nowrap">الملابس</button>

            <button onclick="setFilter('أحذية')" id="btn-أحذية"
                    class="px-4 py-2 font-bold hover:text-gray-900 transition whitespace-nowrap">الأحذية</button>

            <button onclick="setFilter('حقائب')" id="btn-حقائب"
                    class="px-4 py-2 font-bold hover:text-gray-900 transition whitespace-nowrap">الحقائب</button>
        </div>

        <div id="loadingBox" class="text-center text-gray-500 py-8">
            جاري تحميل المنتجات...
        </div>

        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </main>

    <!-- عربة التسوق -->
    <div id="cartModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-end md:items-center justify-center">
        <div class="bg-white rounded-t-2xl md:rounded-2xl shadow-xl w-full max-w-md p-6 max-h-[80vh] overflow-y-auto">

            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">عربة التسوق</h3>
                <button onclick="toggleCart()" class="text-gray-500 font-bold p-2">إغلاق</button>
            </div>

            <div id="cartItems" class="space-y-4 mb-4"></div>

            <div class="border-t pt-4">
                <p id="totalPrice" class="text-lg font-bold">الإجمالي: 0 أوقية</p>

                <button onclick="checkout()"
                        class="w-full mt-4 bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 font-bold">
                    إتمام الطلب عبر واتساب
                </button>
            </div>
        </div>
    </div>

    <!-- تسجيل دخول المدير -->
    <div id="adminLoginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center px-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">

            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-extrabold">دخول المدير</h3>
                <button onclick="closeAdminLogin()" class="text-gray-500 font-bold">إغلاق</button>
            </div>

            <label class="text-sm font-bold">إيميل المدير</label>
            <input id="adminEmailInput" type="email"
                   class="w-full border rounded-lg px-3 py-2 mt-1 mb-3"
                   placeholder="admin@store.com">

            <label class="text-sm font-bold">كود المدير</label>
            <input id="adminCodeInput" type="password"
                   class="w-full border rounded-lg px-3 py-2 mt-1 mb-4"
                   placeholder="اكتب الكود">

            <button onclick="loginAdmin()"
                    class="w-full bg-gray-900 text-white py-3 rounded-lg font-bold">
                دخول
            </button>
        </div>
    </div>

    <!-- لوحة المدير -->
    <div id="adminPanelModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-end md:items-center justify-center">
        <div class="bg-white rounded-t-2xl md:rounded-2xl shadow-xl w-full max-w-3xl p-6 max-h-[90vh] overflow-y-auto">

            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-extrabold">لوحة تحكم المدير</h3>

                <div class="flex gap-2">
                    <button onclick="logoutAdmin()"
                            class="text-xs bg-red-100 text-red-700 px-3 py-2 rounded-lg font-bold">
                        خروج
                    </button>

                    <button onclick="closeAdminPanel()" class="text-gray-500 font-bold p-2">
                        إغلاق
                    </button>
                </div>
            </div>

            <form onsubmit="addProduct(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 border rounded-xl p-4 mb-6">

                <div>
                    <label class="text-sm font-bold">اسم المنتج</label>
                    <input id="productName" type="text" required
                           class="w-full border rounded-lg px-3 py-2 mt-1"
                           placeholder="مثال: ساعة فاخرة">
                </div>

                <div>
                    <label class="text-sm font-bold">السعر بالأوقية</label>
                    <input id="productPrice" type="number" required
                           class="w-full border rounded-lg px-3 py-2 mt-1"
                           placeholder="مثال: 1200">
                </div>

                <div>
                    <label class="text-sm font-bold">القسم</label>
                    <select id="productCategory" required
                            class="w-full border rounded-lg px-3 py-2 mt-1">
                        <option value="ساعات">ساعات</option>
                        <option value="ملابس">ملابس</option>
                        <option value="أحذية">أحذية</option>
                        <option value="حقائب">حقائب</option>
                    </select>
                </div>

                <div>
                    <label class="text-sm font-bold">رابط الصورة</label>
                    <input id="productImageUrl" type="url"
                           class="w-full border rounded-lg px-3 py-2 mt-1"
                           placeholder="https://example.com/image.jpg">
                </div>

                <div class="md:col-span-2">
                    <label class="text-sm font-bold">أو ارفع صورة من الهاتف</label>
                    <input id="productImageFile" type="file" accept="image/*"
                           class="w-full border rounded-lg px-3 py-2 mt-1 bg-white">

                    <p class="text-xs text-gray-500 mt-1">
                        الأفضل استخدام رابط صورة. رفع صورة من الهاتف قد يكون ثقيلاً إذا كانت الصورة كبيرة.
                    </p>
                </div>

                <div class="md:col-span-2">
                    <button type="submit"
                            class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">
                        إضافة المنتج للجميع
                    </button>
                </div>
            </form>

            <h4 class="font-extrabold mb-3">المنتجات الحالية</h4>

            <div id="adminProductsList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        /* ضع هنا بيانات Supabase */
        const SUPABASE_URL = "ضع_رابط_SUPABASE_هنا";
        const SUPABASE_ANON_KEY = "ضع_ANON_KEY_هنا";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const whatsappNumber = "22237929637";

        let products = [];
        let cart = [];
        let currentFilter = "الكل";

        async function loadProducts() {
            document.getElementById("loadingBox").classList.remove("hidden");

            const { data, error } = await supabaseClient
                .from("products")
                .select("*")
                .order("created_at", { ascending: false });

            document.getElementById("loadingBox").classList.add("hidden");

            if (error) {
                alert("خطأ في تحميل المنتجات: " + error.message);
                return;
            }

            products = data || [];
            renderProducts();
            renderAdminProducts();
        }

        function setFilter(filter) {
            currentFilter = filter;

            document.querySelectorAll('button[onclick^="setFilter"]').forEach(btn => {
                btn.classList.remove("tab-active");
            });

            document.getElementById(`btn-${filter}`).classList.add("tab-active");

            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById("productGrid");

            const filteredProducts =
                currentFilter === "الكل"
                    ? products
                    : products.filter(p => p.category === currentFilter);

            if (filteredProducts.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-2 md:col-span-4 bg-white rounded-xl p-8 text-center text-gray-500">
                        لا توجد منتجات حالياً
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredProducts.map(p => `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 flex flex-col hover:shadow-lg transition">
                    <img src="${p.img || ''}" alt="${p.name}"
                         class="w-full aspect-square object-cover"
                         onerror="this.src='https://placehold.co/400x400/e5e7eb/111827?text=صورة+المنتج'">

                    <div class="p-3 flex-grow text-center">
                        <span class="text-[10px] text-gray-400">${p.category}</span>
                        <h3 class="font-bold text-sm mb-1">${p.name}</h3>
                        <p class="text-xs text-gray-600 mb-3">${p.price} أوقية</p>

                        <button onclick="addToCart(${p.id})"
                                class="bg-gray-900 text-white py-2 rounded-lg text-xs w-full hover:bg-gray-800 transition">
                            إضافة إلى العربة
                        </button>
                    </div>
                </div>
            `).join("");
        }

        function toggleCart() {
            document.getElementById("cartModal").classList.toggle("hidden");
        }

        function addToCart(id) {
            const product = products.find(p => Number(p.id) === Number(id));

            if (!product) {
                alert("المنتج غير موجود");
                return;
            }

            cart.push(product);
            updateCartUI();
            alert("تمت إضافة المنتج إلى العربة");
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById("cartItems");
            const total = document.getElementById("totalPrice");
            const count = document.getElementById("cartCount");

            count.innerText = cart.length;

            if (cart.length === 0) {
                list.innerHTML = `<p class="text-sm text-gray-500 text-center">العربة فارغة</p>`;
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div class="flex justify-between items-center border-b pb-2 text-sm">
                        <div>
                            <p class="font-bold">${item.name}</p>
                            <p class="text-gray-500">${item.price} أوقية</p>
                        </div>

                        <button onclick="removeFromCart(${index})"
                                class="text-red-600 text-xs font-bold">
                            حذف
                        </button>
                    </div>
                `).join("");
            }

            const totalPrice = cart.reduce((acc, curr) => acc + Number(curr.price), 0);
            total.innerText = `الإجمالي: ${totalPrice} أوقية`;
        }

        function checkout() {
            if (cart.length === 0) {
                alert("العربة فارغة");
                return;
            }

            const totalPrice = cart.reduce((acc, curr) => acc + Number(curr.price), 0);

            const orderDetails = cart.map((item, index) => {
                return `${index + 1}- ${item.name} - ${item.price} أوقية`;
            }).join("\n");

            const message =
`السلام عليكم، أريد طلب المنتجات التالية:

${orderDetails}

الإجمالي: ${totalPrice} أوقية`;

            window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`, "_blank");

            cart = [];
            updateCartUI();
            toggleCart();
        }

        function openAdminLogin() {
            document.getElementById("adminLoginModal").classList.remove("hidden");
        }

        function closeAdminLogin() {
            document.getElementById("adminLoginModal").classList.add("hidden");
        }

        async function loginAdmin() {
            const email = document.getElementById("adminEmailInput").value.trim();
            const password = document.getElementById("adminCodeInput").value.trim();

            if (!email || !password) {
                alert("اكتب الإيميل والكود");
                return;
            }

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert("الإيميل أو الكود غير صحيح");
                return;
            }

            closeAdminLogin();
            openAdminPanel();
        }

        function openAdminPanel() {
            document.getElementById("adminPanelModal").classList.remove("hidden");
            renderAdminProducts();
        }

        function closeAdminPanel() {
            document.getElementById("adminPanelModal").classList.add("hidden");
        }

        async function logoutAdmin() {
            await supabaseClient.auth.signOut();
            closeAdminPanel();
            alert("تم تسجيل الخروج");
        }

        async function addProduct(event) {
            event.preventDefault();

            const name = document.getElementById("productName").value.trim();
            const price = document.getElementById("productPrice").value.trim();
            const category = document.getElementById("productCategory").value;
            const imageUrl = document.getElementById("productImageUrl").value.trim();
            const imageFile = document.getElementById("productImageFile").files[0];

            if (!name || !price) {
                alert("اكتب اسم المنتج والسعر");
                return;
            }

            if (imageFile) {
                const reader = new FileReader();

                reader.onload = async function(e) {
                    await createProduct(name, price, category, e.target.result);
                };

                reader.readAsDataURL(imageFile);
            } else {
                const finalImage = imageUrl || "https://placehold.co/400x400/e5e7eb/111827?text=صورة+المنتج";
                await createProduct(name, price, category, finalImage);
            }
        }

        async function createProduct(name, price, category, img) {
            const { error } = await supabaseClient
                .from("products")
                .insert({
                    name: name,
                    price: Number(price),
                    category: category,
                    img: img
                });

            if (error) {
                alert("لم يتم إضافة المنتج: " + error.message);
                return;
            }

            document.getElementById("productName").value = "";
            document.getElementById("productPrice").value = "";
            document.getElementById("productImageUrl").value = "";
            document.getElementById("productImageFile").value = "";

            alert("تمت إضافة المنتج وظهر للجميع");

            await loadProducts();
        }

        function renderAdminProducts() {
            const list = document.getElementById("adminProductsList");

            if (!list) return;

            if (products.length === 0) {
                list.innerHTML = `<p class="text-center text-gray-500">لا توجد منتجات</p>`;
                return;
            }

            list.innerHTML = products.map(product => `
                <div class="flex items-center gap-3 bg-gray-50 border rounded-xl p-3">
                    <img src="${product.img || ''}"
                         class="w-16 h-16 rounded-lg object-cover"
                         onerror="this.src='https://placehold.co/100x100/e5e7eb/111827?text=صورة'">

                    <div class="flex-1">
                        <p class="font-bold">${product.name}</p>
                        <p class="text-xs text-gray-500">${product.category}</p>
                        <p class="text-sm font-bold">${product.price} أوقية</p>
                    </div>

                    <button onclick="deleteProduct(${product.id})"
                            class="bg-red-600 text-white px-3 py-2 rounded-lg text-xs font-bold">
                        حذف
                    </button>
                </div>
            `).join("");
        }

        async function deleteProduct(id) {
            if (!confirm("هل تريد حذف هذا المنتج؟")) return;

            const { error } = await supabaseClient
                .from("products")
                .delete()
                .eq("id", id);

            if (error) {
                alert("لم يتم حذف المنتج: " + error.message);
                return;
            }

            alert("تم حذف المنتج");
            await loadProducts();
        }

        window.onload = async function () {
            await loadProducts();
            updateCartUI();
        };
    </script>

</body>
</html>
